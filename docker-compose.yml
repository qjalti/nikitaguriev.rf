services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=pguser
      - POSTGRES_PASSWORD=UUpsaH7JSK2#FJHbJObir2#
      - POSTGRES_DB=pet
      - TZ=Europe/Moscow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnet

  app:
    build: .
    container_name: nikitaguriev-rf
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=Europe/Moscow
      - DB_HOST=postgres
      - DB_USER=pguser
      - DB_NAME=pet
      - DB_PASSWORD=UUpsaH7JSK2#FJHbJObir2#
    ports:
      - "84:84"
    depends_on:
      - postgres
    networks:
      - appnet

networks:
  appnet:
    external: true

volumes:
  postgres_data:
    external: true